<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#07130e" />
    <title>森之漫遊 · Endless Forest</title>
  </head>
  <body>
    <div id="app">
      <canvas id="world" aria-label="可互動的無盡森林"></canvas>

      <header class="topbar">
        <a class="brand" href="#" aria-label="森之漫遊首頁">
          <span class="brand-mark">✦</span>
          <span><b>森之漫遊</b><small>ENDLESS FOREST</small></span>
        </a>
        <div class="topbar-actions">
          <div class="status"><i></i><span>森林正在甦醒</span></div>
          <button class="music-toggle" id="musicToggle" type="button" aria-pressed="true" title="關閉背景音樂">
            <span aria-hidden="true">♫</span><b>MUSIC ON</b>
          </button>
        </div>
      </header>

      <aside class="hero-card" aria-label="在線玩家">
        <p class="eyebrow">ONLINE TRAVELLERS</p>
        <div class="online-player-list" id="onlinePlayerList">
          <div class="online-player local"><span>主</span><div><b>小森</b><small>你 · 本地漫遊</small></div></div>
        </div>
      </aside>

      <section class="intro" id="intro">
        <p class="eyebrow">A QUIET PLACE WITHOUT AN END</p>
        <h1>走進，一座<br /><em>沒有盡頭</em>的森林</h1>
        <p class="lede"></p>
        <div class="start-actions">
          <button id="beginBtn"><span>單人漫遊</span><b>↗</b></button>
          <div class="coop-panel">
            <p>合作模式 · 最多 4 人</p>
            <div class="coop-row"><input id="playerName" maxlength="12" value="小森" aria-label="玩家名稱" /><input id="roomCode" maxlength="6" placeholder="房間代碼" aria-label="房間代碼" /></div>
            <div class="coop-row"><button id="createRoomBtn" type="button">建立房間</button><button id="joinRoomBtn" type="button">加入房間</button></div>
            <small id="coopStatus">建立房間後，把代碼告訴朋友即可。</small>
          </div>
        </div>
      </section>

      <div class="hint" id="hint">
        <span class="mouse"><i></i></span>
        <span><b>左鍵移動 · 右鍵跳躍</b><small>CLICK TO MOVE · RIGHT CLICK TO JUMP</small></span>
      </div>

      <div class="coordinates"><span>霧林區域</span><b id="coords">N 00 · E 00</b><em id="bossTracker">正在尋找首領蹤跡…</em><button id="returnBtn" type="button">返回起始帳篷</button></div>
      <div class="wallet"><img src="/images/coin.svg" alt="Coin"><b id="coinCount">0</b></div>
      <div class="room-hud hidden" id="roomHud"><span>CO-OP</span><b id="roomLabel">ROOM ------</b><small id="playerCount">1 / 4 PLAYERS</small><button id="leaveRoomBtn" type="button">離開</button></div>
      <div class="room-recovery hidden" id="roomRecovery"><span>CO-OP RESET</span><b>舊房間已被免費伺服器清除</b><small>你的本地旅程仍然保留，可以立即建立新房間。</small><button id="createNewRoomBtn" type="button">建立新房間</button></div>
      <div class="loader" id="loader"><span></span><p>正在喚醒森林…</p></div>
      <audio id="bgm" class="game-audio" src="/music/bgm.mp3" loop preload="auto"></audio>
      <audio id="battleMusic" class="game-audio" src="/music/battle.mp3" loop preload="auto"></audio>
      <audio id="walkingSound" class="game-audio" src="/music/walking.mp3" loop preload="auto"></audio>
      <audio id="hitSound" class="game-audio" src="/music/hit.mp3" preload="auto"></audio>
      <audio id="coinSound" class="game-audio" src="/music/coin.mp3" preload="auto"></audio>
      <audio id="bossWinSound" class="game-audio" src="/music/boss_win.mp3" preload="auto"></audio>
      <audio id="bossGoneSound" class="game-audio" src="/music/boss_is_gone.mp3" preload="auto"></audio>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
